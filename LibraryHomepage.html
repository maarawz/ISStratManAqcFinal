<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Dashboard</title>

<style>


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}



body {
    display: flex;
    background: #e6e6e6;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #111;
    color: white;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    font-size: 16px;
    margin-bottom: 30px;
    opacity: 0.8;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    margin: 20px 0;
}

.sidebar ul li a {
    text-decoration: none;
    color: white;
    font-size: 14px;
}

.sidebar ul li a:hover {
    color: #1abc9c;
}

.logout {
    position: absolute;
    bottom: 20px;
    font-size: 14px;
}

.main {
    margin-left: 220px;
    width: 100%;
}

.topbar {
    height: 70px;
    background: #dcdcdc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

.logo {
    font-weight: bold;
}

.logo span {
    background: #000000;
    color: white;
    padding: 3px 8px;
    border-radius: 10px;
    margin-left: 5px;
}

.content {
    padding: 30px;
}

.card-container {
    background: #f2f2f2;
    padding: 30px;
    border-radius: 30px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.card {
    width: 22%;
    background: #2f4f4f;
    color: white;
    text-align: center;
    padding: 20px;
    border-radius: 5px;
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}

.card:hover {
    transform: scale(1.05);
}

@media(max-width: 900px){
    .card {
        width: 48%;
        margin-bottom: 15px;
    }
}

@media(max-width: 600px){
    .sidebar {
        display: none;
    }

    .main {
        margin-left: 0;
    }

    .card {
        width: 100%;
    }
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>ADMIN</h2>
    <ul>
        <li><a href="LibraryDashboard.html">DASHBOARD</a></li>
        <li><a href="#">ADD BOOKS</a></li>
        <li><a href="#">BORROW & RETURN</a></li>
        <li><a href="#">INVENTORY</a></li>
    </ul>

    <div class="logout">
        LOGOUT ⏻
    </div>
</div>

<div class="main">

    <div class="topbar">
        <div class="logo">
            Intelli<span>Lib</span>
        </div>
        <div>🔔</div>
    </div>

    <div class="content">
        <div class="card-container">

                <div class="card">
                <a href="LibraryLibraryBookList.html" style="text-decoration: none; color: inherit;">

                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
                <h3>LIBRARY</h3>
            </div>
            </a>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
                <h3>BORROWERS LIST</h3>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
                <h3>REPORTS</h3>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/1827/1827392.png">
                <h3>UPDATES</h3>
            </div>

        </div>
    </div>

</div>

</body>
</html>
